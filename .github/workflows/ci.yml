name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  DATABASE_URL: postgresql://test:test@localhost:5432/test_db
  JWT_SECRET: test-jwt-secret-at-least-32-characters-long!
  CLIENT_URL: http://127.0.0.1:5173
  RAZORPAY_KEY_ID: rzp_test_TESTID
  RAZORPAY_KEY_SECRET: test_secret_TESTKEY
  VITE_API_BASE_URL: http://127.0.0.1:3001/api
  PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
  PLAYWRIGHT_API_URL: http://127.0.0.1:3001
  CI: true

jobs:
  quality:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install --with-deps chromium firefox webkit

      - name: ESLint — backend
        working-directory: server
        run: npm run lint

      - name: ESLint — frontend
        working-directory: client
        run: npm run lint

      - name: Prepare database (migrate deploy + seed)
        working-directory: server
        run: npm run db:ci:setup
        env:
          NODE_ENV: test

      - name: Build frontend
        working-directory: client
        run: npm run build
        env:
          VITE_API_BASE_URL: http://127.0.0.1:3001/api

      - name: Generate Prisma client (backend build step)
        working-directory: server
        run: npm run db:generate

      - name: Backend unit & integration tests
        working-directory: server
        run: npm run test:ci
        env:
          NODE_ENV: test

      - name: Frontend unit tests
        working-directory: client
        run: npm run test

      - name: Playwright E2E (starts API + Vite, then runs browsers)
        working-directory: client
        run: npm run test:e2e:ci
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          JWT_SECRET: test-jwt-secret-at-least-32-characters-long!
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          PLAYWRIGHT_API_URL: http://127.0.0.1:3001
          VITE_BACKEND_URL: http://127.0.0.1:3001

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: server/coverage/
          if-no-files-found: ignore

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: client/test-results/
          if-no-files-found: ignore

  playwright-cross-browser:
    name: Playwright — Firefox & WebKit
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix server
          npm ci --prefix client

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install --with-deps firefox webkit

      - name: Prepare database
        working-directory: server
        run: npm run db:ci:setup
        env:
          NODE_ENV: test

      - name: Build frontend
        working-directory: client
        run: npm run build
        env:
          VITE_API_BASE_URL: http://127.0.0.1:3001/api

      - name: Playwright — Firefox & WebKit
        working-directory: client
        run: npx playwright test --project=firefox --project=webkit
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          JWT_SECRET: test-jwt-secret-at-least-32-characters-long!
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          PLAYWRIGHT_API_URL: http://127.0.0.1:3001
          VITE_BACKEND_URL: http://127.0.0.1:3001

      - name: Upload cross-browser Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-cross-browser-report
          path: client/playwright-report/
          if-no-files-found: ignore

<svg width="920" height="640" viewBox="0 0 920 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="860" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF6FF"/>

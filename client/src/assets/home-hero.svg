      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="soft" x="-80" y="-80" width="1080" height="800" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
